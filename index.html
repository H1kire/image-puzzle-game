<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Image Puzzle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
 
<div class="game-container">

  <div class="left-panel">
    <h2>🧩 Image Puzzle</h2>

    <div class="controls">
      <label>Складність:
        <select id="difficulty">
          <option value="3">3×3</option>
          <option value="4" selected>4×4</option>
          <option value="5">5×5</option>
        </select>
      </label>

      <button class="random-btn" onclick="useRandomImage()">
        🎲 Random Image
      </button>

      <input type="file" id="imageUpload" accept="image/*">

      <button id="shuffleBtn">Перемешать</button>
    </div>



    <div class="info">
      <span>Ходи: <span id="moves">0</span></span>
      <span>Час: <span id="timer">0</span> с</span>
    </div>

    <div id="reference">
      <h3>Оригинал</h3>
      <img id="referenceImage" src="images/stock_image.jpg">
    </div>
  </div>

  <div id="game"></div>

</div>
<div id="winModal" class="modal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeModal()">×</span>
    <h2>🎉 Puzzle Completed!</h2>

    <div class="stats">
      <p><strong>Time:</strong> <span id="finalTime"></span></p>
      <p><strong>Moves:</strong> <span id="finalMoves"></span></p>
      <p><strong>Grid Size:</strong> <span id="finalSize"></span></p>
    </div>

    <button class="restart-btn" onclick="restartGame()">Play Again</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
